<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Form</title>

    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div class="container">

        <h2>Login Form</h2>

        <form id="myForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            <button type="submit">
                Submit
            </button>

            <p id="message"></p>

        </form>

    </div>

    <script src="script.js"></script>

</body>
</html>
